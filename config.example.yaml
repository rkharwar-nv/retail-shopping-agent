# Copy this file to config.yaml and adjust as needed.
# config.yaml is gitignored. Secrets (API keys) live in .env, not here.

# Interface/schema version. Bump when breaking changes happen.
schema_version: 1

models:
  role1:
    # Multimodal input processing (image + audio + text).
    provider: nvidia-build
    base_url: https://integrate.api.nvidia.com/v1
    model_id: nvidia/nemotron-3-nano-omni-30b-a3b-reasoning
    api_key_env: ROLE1_API_KEY     # name of the env var to read
    timeout_seconds: 60
    max_retries: 2

    # Tuning knobs. Defaults here match NVIDIA's canonical Omni
    # example; override if you're experimenting.
    generation:
      temperature: 0.6
      top_p: 0.95
      max_tokens: 32768           # reasoning models emit a LOT; keep headroom
      stream: false               # set true for demos; false for API callers
      extras:                     # passed through as NIM extra_body
        chat_template_kwargs:
          enable_thinking: true
        reasoning_budget: 16384

    # Behavioral prompt. The JSON output contract lives in code,
    # not here — that's tied to the Pydantic parser and must not
    # drift. What belongs here is the role + style you want the
    # model to adopt, plus per-perception-type emphasis hints.
    prompts:
      role_instructions: |
        You are the input-processing stage of a retail shopping agent.
        Your job is to classify what the user is sharing and extract
        structured perception from it.

        Possible image/input types in Phase 1:
        - pantry:        food, fridge, ingredients, or pantry photos
                         (what the user HAS right now)
        - shopping_list: handwritten or printed lists of items to buy
        - food_label:    nutrition panels, ingredient lists, packaging
                         info panels
        - fashion:       clothing, shoes, accessories, bags (classify
                         honestly if seen — downstream routing is
                         future phase)
        - cosmetics:     skincare, makeup, fragrance (classify but do
                         not deep-extract in Phase 1)
        - unknown:       none of the above, or visuals too unclear

        Pick exactly ONE perception_type. Populate only the matching
        typed field. Leave others null. Always produce a scene_summary
        and a user_intent_hint.

      style: |
        Be concise and faithful. No emojis. No editorial commentary.
        No code fences in your response. When uncertain, prefer lower
        confidence over guessing. Never invent brands, nutrition
        facts, or items you can't clearly perceive.

      # Per-perception-type extraction emphasis. The model uses
      # whichever matches after it classifies. Edit freely — these
      # tune behavior without touching code.
      vertical_hints:
        pantry: |
          Focus on what the user HAS RIGHT NOW. For each item extract
          quantity_hint (full/half/low, or approximate count),
          brand (only if clearly visible), freshness_hint (visible
          wilting, expiry dates, bruising), and category (produce,
          dairy, grain, protein, pantry-dry, frozen, beverage).
          Populate notable_gaps with common staples that appear
          MISSING given what you see. Populate suggested_recipe_hints
          with 2-3 meal ideas possible from the visible items.

        shopping_list: |
          Transcribe each line EXACTLY as written first (raw_text).
          Then populate normalized_name in cleaned form
          ("milk" → "milk, 1 gallon"; "2% mlk" → "milk, 2%").
          Extract quantity if present. Put unreadable lines under
          ambiguous_lines, unchanged. Estimate legibility_score 0-1.

        food_label: |
          Parse the product information panel carefully. Do NOT
          invent numeric values — if a macro is not clearly legible,
          omit it from the macros dict. Preserve ingredient order.
          Pull allergen_callouts exactly ("Contains: milk, eggs").
          List any certifications visible (organic, non-GMO, kosher,
          halal, gluten-free, etc.).

        fashion: |
          Identify the primary garment first (type, color, pattern).
          Be conservative with material_guess — cotton vs linen is
          hard visually. Note brand ONLY if label is clearly
          readable. Leave size_visible null unless a size tag is
          plainly shown.

        cosmetics: |
          Classify the product type (lipstick, moisturizer, serum,
          fragrance, etc.) and brand if visible. Keep notes brief —
          Phase 1 does not deep-extract cosmetics yet.

  role2:
    # Reasoning + tool calling. Consumes role1's structured output.
    provider: nvidia-inference
    base_url: https://inference-api.nvidia.com/v1
    model_id: nvidia/Nemotron-3-Super-120B-A12B
    api_key_env: ROLE2_API_KEY
    timeout_seconds: 60
    max_retries: 2
    generation:
      temperature: 0.4
      max_tokens: 4096

  role3:
    # Text embeddings. Same host as role2; separate key for
    # rotation/scope independence.
    provider: nvidia-inference
    base_url: https://inference-api.nvidia.com/v1
    model_id: nvidia/llama-3.2-nv-embedqa-1b-v2
    api_key_env: ROLE3_API_KEY
    timeout_seconds: 15
    max_retries: 2

vector_store:
  driver: pgvector
  # connection_string_env: POSTGRES_URL   # uncomment when wiring up

events:
  sink: jsonl_file               # Phase 1 default
  path: ./events/events.jsonl
  non_blocking: true             # bus failure must not block turns

catalog:
  source: hybrid                 # public + synthetic
  seed_size: 1000                # target products in Phase 1 catalog

# Empty hooks — Phase 1 shapes without implementation
hooks:
  guardrails: noop               # passes input/output through
  profile: empty                 # returns empty profile
  consent: always_granted        # no prompt

# Developer introspection. KEEP OFF in shared/prod environments —
# traces contain raw prompts and raw model responses.
debug:
  enabled: true                  # turn on for dev / smoke workflow
  buffer_size: 20                # entries per session kept in memory
  ttl_seconds: 300               # entries evicted after 5 minutes
